server {
  listen 80;
  listen [::]:80;
  server_name ${WWW_DOMAIN};

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    return 301 https://${PRIMARY_DOMAIN}$request_uri;
  }
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name ${PRIMARY_DOMAIN} localhost 127.0.0.1;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name ${WWW_DOMAIN};

  ssl_certificate ${TLS_CERT_PATH};
  ssl_certificate_key ${TLS_KEY_PATH};
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  return 301 https://${PRIMARY_DOMAIN}$request_uri;
}

server {
  listen 443 ssl default_server;
  listen [::]:443 ssl default_server;
  server_name ${PRIMARY_DOMAIN} localhost 127.0.0.1;

  ssl_certificate ${TLS_CERT_PATH};
  ssl_certificate_key ${TLS_KEY_PATH};
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  root /usr/share/nginx/html;
  index index.html;

  location = /nginx-healthz {
    access_log off;
    default_type application/json;
    return 200 "{\"status\":\"ok\",\"service\":\"nginx\",\"primaryDomain\":\"${PRIMARY_DOMAIN}\",\"wwwDomain\":\"${WWW_DOMAIN}\",\"certificate\":\"${TLS_CERT_PATH}\",\"autoReload\":\"${TLS_AUTO_RELOAD}\",\"reloadIntervalSeconds\":\"${TLS_RELOAD_INTERVAL_SECONDS}\"}\n";
  }

  location /healthz {
    proxy_pass http://blog-api:8080/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://blog-api:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
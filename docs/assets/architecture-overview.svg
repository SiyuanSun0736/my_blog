<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 880" role="img" aria-labelledby="title desc">
  <title id="title">博客系统总架构图</title>
  <desc id="desc">展示用户、管理端、Nginx、Go API、MongoDB、Redis、媒体卷与证书目录之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .stack { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2.5; }
      .group { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .service { fill: #e0f2fe; stroke: #0f766e; stroke-width: 2.5; }
      .data { fill: #dcfce7; stroke: #15803d; stroke-width: 2.5; }
      .volume { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2.5; }
      .actor { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; }
      .title { font: 700 30px 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .label { font: 700 24px 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .text { font: 500 22px 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .small { font: 500 20px 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #1e293b; }
      .edge { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .edge-label { font: 500 18px 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #1d4ed8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="880" rx="28"/>
  <text class="title" x="720" y="62" text-anchor="middle">Docker Compose 应用栈总览</text>

  <rect class="actor" x="60" y="180" width="180" height="84" rx="22"/>
  <text class="label" x="150" y="232" text-anchor="middle">用户浏览器</text>

  <rect class="actor" x="60" y="320" width="180" height="84" rx="22"/>
  <text class="label" x="150" y="372" text-anchor="middle">管理端编辑器</text>

  <rect class="stack" x="300" y="110" width="1080" height="680" rx="34"/>
  <text class="label" x="840" y="156" text-anchor="middle">Docker Compose 应用栈</text>

  <rect class="service" x="360" y="200" width="250" height="170" rx="24"/>
  <text class="label" x="485" y="252" text-anchor="middle">blog-web 容器</text>
  <text class="text" x="485" y="294" text-anchor="middle">Nginx</text>
  <text class="small" x="485" y="326" text-anchor="middle">TLS 终止 / 静态资源 / 反向代理</text>

  <rect class="service" x="660" y="200" width="250" height="170" rx="24"/>
  <text class="label" x="785" y="252" text-anchor="middle">blog-api 容器</text>
  <text class="text" x="785" y="294" text-anchor="middle">Go API</text>
  <text class="small" x="785" y="326" text-anchor="middle">文章接口 / 上传接口 / PDF 导出</text>

  <rect class="group" x="960" y="180" width="320" height="250" rx="28"/>
  <text class="label" x="1120" y="226" text-anchor="middle">数据服务</text>

  <rect class="data" x="995" y="255" width="250" height="74" rx="20"/>
  <text class="text" x="1120" y="300" text-anchor="middle">MongoDB / posts 集合</text>

  <rect class="data" x="995" y="345" width="250" height="74" rx="20"/>
  <text class="text" x="1120" y="390" text-anchor="middle">Redis / 图片摘要去重索引</text>

  <rect class="volume" x="372" y="560" width="226" height="96" rx="28"/>
  <text class="text" x="485" y="604" text-anchor="middle">证书目录 / Certbot</text>
  <text class="small" x="485" y="636" text-anchor="middle">TLS 证书与校验文件</text>

  <rect class="volume" x="670" y="560" width="230" height="96" rx="28"/>
  <text class="text" x="785" y="604" text-anchor="middle">blog-media 卷</text>
  <text class="small" x="785" y="636" text-anchor="middle">上传图片与共享媒体</text>

  <rect class="volume" x="952" y="560" width="230" height="96" rx="28"/>
  <text class="text" x="1067" y="604" text-anchor="middle">mongodb-data 卷</text>
  <text class="small" x="1067" y="636" text-anchor="middle">MongoDB 持久化数据</text>

  <rect class="volume" x="1150" y="680" width="188" height="78" rx="26"/>
  <text class="text" x="1244" y="726" text-anchor="middle">redis-data 卷</text>

  <line class="edge" x1="240" y1="222" x2="360" y2="222"/>
  <text class="edge-label" x="300" y="204" text-anchor="middle">HTTPS 80/443</text>

  <line class="edge" x1="240" y1="362" x2="360" y2="342"/>
  <text class="edge-label" x="303" y="334" text-anchor="middle">HTTPS 80/443</text>

  <line class="edge" x1="360" y1="282" x2="240" y2="282"/>
  <text class="edge-label" x="300" y="268" text-anchor="middle">前端静态文件</text>

  <line class="edge" x1="610" y1="238" x2="660" y2="238"/>
  <text class="edge-label" x="635" y="214" text-anchor="middle">/api /healthz /sitemap.xml /robots.txt</text>

  <line class="edge" x1="610" y1="328" x2="660" y2="328"/>
  <text class="edge-label" x="635" y="310" text-anchor="middle">/posts/:slug/pdf</text>

  <path class="edge" d="M 540 370 C 540 452 694 470 770 560"/>
  <text class="edge-label" x="650" y="470" text-anchor="middle">/media/* 直接分发</text>

  <line class="edge" x1="910" y1="274" x2="995" y2="274"/>
  <text class="edge-label" x="952" y="256" text-anchor="middle">读写文章</text>

  <line class="edge" x1="910" y1="382" x2="995" y2="382"/>
  <text class="edge-label" x="952" y="364" text-anchor="middle">摘要查重</text>

  <line class="edge" x1="785" y1="370" x2="785" y2="560"/>
  <text class="edge-label" x="810" y="468">写入媒体文件</text>

  <line class="edge" x1="485" y1="370" x2="485" y2="560"/>
  <text class="edge-label" x="512" y="468">加载证书</text>

  <line class="edge" x1="1120" y1="329" x2="1067" y2="560"/>
  <text class="edge-label" x="1102" y="470" text-anchor="middle">持久化</text>

  <line class="edge" x1="1120" y1="419" x2="1244" y2="680"/>
  <text class="edge-label" x="1185" y="560" text-anchor="middle">持久化</text>
</svg>